name: Update economic calendar

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours
  workflow_dispatch:          # allow manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch calendar feeds (this week + next week)
        run: |
          mkdir -p data
          curl -sf --max-time 60 --retry 3 --retry-delay 30 \
            -A "real-yields-dashboard/1.0 (github.com/jeykay16/real-yields)" \
            "https://nfs.faireconomy.media/ff_calendar_thisweek.json" -o /tmp/w1.json
          sleep 10
          curl -sf --max-time 60 --retry 3 --retry-delay 30 \
            -A "real-yields-dashboard/1.0 (github.com/jeykay16/real-yields)" \
            "https://nfs.faireconomy.media/ff_calendar_nextweek.json" -o /tmp/w2.json || true
          python3 - <<'EOF'
          import json, datetime, os
          events = json.load(open("/tmp/w1.json"))
          if os.path.exists("/tmp/w2.json"):
              try:
                  events += json.load(open("/tmp/w2.json"))
              except Exception:
                  pass
          seen, merged = set(), []
          for e in events:
              key = (e.get("title"), e.get("country"), e.get("date"))
              if key not in seen:
                  seen.add(key)
                  merged.append(e)
          out = {"updated": datetime.datetime.now(datetime.timezone.utc).isoformat(), "events": merged}
          json.dump(out, open("data/calendar.json", "w"))
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/calendar.json
          git diff --cached --quiet || { git commit -m "Update economic calendar data"; git push; }
